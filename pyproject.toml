# Ruff

[tool.ruff]
ignore = [
    "E402", # module level import not at top of file
    "F541", # f-string is missing placeholders
]
line-length = 100

[tool.ruff.format]
quote-style = "single"

# Black

[tool.black]
skip-string-normalization = true
line-length = 100

# pytest

[tool.pytest.ini_options]
# We add this so that pytest imports use the same import paths as the rest of the code. Without
# this, we will for example get multiple SQLAlchemy table registration bases, one under each import
# path.
pythonpath = ["webapp"]
filterwarnings = [
    # Treat all warnings as errors.
    "error",
    # Ignore specific warnings.
    "ignore::DeprecationWarning",
    "ignore:function ham\\(\\) is deprecated:DeprecationWarning"]

addopts = [
    # "-p no:warnings"
    '--capture=no',
    # -ra: Show reason for skipped tests and additional test output summary
    '-ra',
]
testpaths = ['./tests']
python_files = ['test_*.py']
norecursedirs = ['test_docs']


[tool.pixi.workspace]
name = "ridare"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[tool.pixi.dependencies]
python = ">=3.14.3,<3.15"
markdown = ">=3.10.2,<4"
flask = ">=3.1.3,<4"
pip = ">=26.0.1,<27"
lxml = ">=6.1.0,<7"
pytest = ">=9.0.3,<10"
pytest-flask = ">=1.3.0,<2"
daiquiri = ">=3.0.0,<4"
filelock = ">=3.29.0,<4"
gunicorn = ">=25.3.0,<26"
jinja2 = ">=3.1.6,<4"
requests = ">=2.33.1,<3"
grip = ">=4.6.2,<5"
libiconv = ">=1.18,<2"
flask-cors = ">=6.0.2,<7"

[tool.pixi.tasks]
req = "pixi list --json | jq -r '.[] | \"\\(.name)==\\(.version)\"' > requirements.txt"
